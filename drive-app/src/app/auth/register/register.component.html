<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">D</div>
      <span class="logo-text">DRIVE <span>App</span></span>
    </div>

    <h2 class="login-title">Crear cuenta</h2>
    <p class="login-sub">Regístrate para acceder al sistema</p>

    <div class="alert-error" *ngIf="errorMsg">⚠️ {{ errorMsg }}</div>

    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" [(ngModel)]="name" placeholder="Tu nombre completo" />
    </div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="email" placeholder="correo@empresa.com" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="Mínimo 6 caracteres" />
    </div>

    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" [(ngModel)]="confirm" placeholder="Repite la contraseña"
             (keyup.enter)="register()" />
    </div>

    <button class="btn-primary" (click)="register()" [disabled]="loading">
      <span *ngIf="loading" class="spinner-sm"></span>
      {{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}
    </button>

    <p class="login-footer">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
